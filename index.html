<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BARİKAT</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#1f2633;
color:white;
padding:15px;
}

.logo{
text-align:center;
font-size:42px;
font-weight:bold;
margin-bottom:20px;
}

.panel{
background:#2b3445;
border-radius:15px;
padding:15px;
margin-bottom:15px;
}

.stats{
display:flex;
gap:15px;
margin-top:10px;
}

.stat{
background:#3a465c;
padding:10px 15px;
border-radius:10px;
font-weight:bold;
}

.field{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:10px;
min-height:90px;
}

.hand{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:15px;
}

.card{
width:120px;
height:160px;
background:#46526a;
border:2px solid #64748b;
border-radius:12px;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:10px;
cursor:pointer;
font-weight:bold;
transition:.2s;
}

.card:hover{
transform:translateY(-5px);
border-color:#f1c40f;
}

.endBtn{
background:#27ae60;
border:none;
color:white;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
margin-top:15px;
}

.log{
background:black;
height:220px;
overflow:auto;
padding:10px;
border-radius:10px;
margin-top:10px;
}

@media(max-width:700px){

.card{
width:100px;
height:130px;
font-size:12px;
}

.logo{
font-size:28px;
}

}

</style>
</head>

<body>

<div class="logo">🧱 BARİKAT</div>

<div class="panel">

<h2>🤖 BOT</h2>

<div class="stats">
<div class="stat">❤️ <span id="botHp">7</span>/7</div>
<div class="stat">🛡️ <span id="botBarricade">0</span>/3</div>
</div>

<div id="botField" class="field"></div>

</div>

<div class="panel">

<h2>🎮 SEN</h2>

<div class="stats">
<div class="stat">❤️ <span id="playerHp">7</span>/7</div>
<div class="stat">🛡️ <span id="playerBarricade">0</span>/3</div>
</div>

<div id="playerField" class="field"></div>

</div>

<div class="panel">

<h2>🃏 ELİNDEKİ KARTLAR</h2>

<div id="hand" class="hand"></div>

<button id="endTurnBtn" class="endBtn">
TURU BİTİR
</button>

</div>

<div class="panel">

<h2>📜 OYUN GÜNLÜĞÜ</h2>

<div id="log" class="log"></div>

</div>

<script>

const player={
hp:7,
barricade:0,
hand:[],
zombies:[]
};

const bot={
hp:7,
barricade:0,
hand:[],
zombies:[]
};

const deck=[

"🧟 Zombi",
"🧟 Zombi",
"🧟 Zombi",

"👹 Dev Zombi",
"👹 Dev Zombi",

"🔫 Tabanca",
"🔫 Tabanca",
"🔫 Tabanca",

"💥 Silah",
"💥 Silah",
"💥 Silah",

"🛡️ Barikat",
"🛡️ Barikat",
"🛡️ Barikat",

"❤️ Tamir",
"❤️ Tamir",

"⚡ Elektrikli Tel",
"⚡ Elektrikli Tel",

"🏴 Yağma",

"🛑 Blok",

"✈️ Hava Saldırısı",

"💉 Enjeksiyon"

];

function randomCard(){
return deck[
Math.floor(Math.random()*deck.length)
];
}

function log(text){

const area=document.getElementById("log");

area.innerHTML+=text+"<br>";

area.scrollTop=area.scrollHeight;

}

function drawCard(target){

target.hand.push(
randomCard()
);

}

function updateStats(){

document.getElementById("playerHp").textContent=player.hp;
document.getElementById("playerBarricade").textContent=player.barricade;

document.getElementById("botHp").textContent=bot.hp;
document.getElementById("botBarricade").textContent=bot.barricade;

}

log("BARİKAT başlatıldı.");
 
function renderHand(){

const hand=document.getElementById("hand");

hand.innerHTML="";

player.hand.forEach((card,index)=>{

const div=document.createElement("div");

div.className="card";

div.innerHTML=card;

div.onclick=()=>{

log(card+" seçildi.");

};

hand.appendChild(div);

});

}

function drawStartingHand(){

for(let i=0;i<5;i++){

drawCard(player);

}

renderHand();

}

drawStartingHand();
updateStats();

</script>

</body>
</html>
