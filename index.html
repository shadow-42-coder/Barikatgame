<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BARİKAT v0.3</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#1a1d22;
color:white;
padding:15px;
}

.logo{
text-align:center;
font-size:42px;
font-weight:bold;
margin-bottom:20px;
}

.panel{
background:#2b313a;
border-radius:12px;
padding:15px;
margin-bottom:15px;
}

.stats{
display:flex;
gap:20px;
margin-top:10px;
}

.stat{
background:#3b4450;
padding:8px 12px;
border-radius:8px;
}

.field{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
min-height:80px;
}

.zombie{
background:#4d5a45;
padding:10px;
border-radius:10px;
min-width:100px;
text-align:center;
}

.hand{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:15px;
}

.card{
background:#3c4654;
border:2px solid #5b6778;
border-radius:12px;
width:130px;
height:160px;
padding:10px;
cursor:pointer;
transition:.2s;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
font-weight:bold;
}

.card:hover{
transform:translateY(-5px);
}

.controls{
margin-top:15px;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.endTurn{
background:#27ae60;
color:white;
}

.log{
height:220px;
overflow:auto;
background:#111;
padding:10px;
border-radius:10px;
margin-top:10px;
}

.winner{
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
font-size:40px;
z-index:999;
}

@media(max-width:700px){

.card{
width:100px;
height:130px;
font-size:13px;
}

.logo{
font-size:30px;
}

}
</style>
</head>

<body>

<div class="logo">🧱 BARİKAT</div>

<div class="panel">
<h2>🤖 BOT</h2>

<div class="stats">
<div class="stat">❤️ <span id="botHp">7</span>/7</div>
<div class="stat">🧱 <span id="botBarricade">0</span>/3</div>
</div>

<div id="botField" class="field"></div>
</div>

<div class="panel">
<h2>🎮 SEN</h2>

<div class="stats">
<div class="stat">❤️ <span id="playerHp">7</span>/7</div>
<div class="stat">🧱 <span id="playerBarricade">0</span>/3</div>
</div>

<div id="playerField" class="field"></div>
</div>

<div class="panel">
<h2>🃏 ELİNDEKİ KARTLAR</h2>

<div id="hand" class="hand"></div>

<div class="controls">
<button class="endTurn" onclick="endTurn()">TURU BİTİR</button>
</div>
</div>

<div class="panel">
<h2>📜 OYUN GÜNLÜĞÜ</h2>
<div id="log" class="log"></div>
</div>

<div id="winner" class="winner">
<div id="winnerText"></div>
</div>

<script>

const player={
hp:7,
barricade:0,
hand:[]
};

const bot={
hp:7,
barricade:0,
hand:[]
};

const cards=[
"🧟 Zombi",
"👹 Dev Zombi",
"🔫 Tabanca",
"💥 Silah",
"🛡️ Barikat",
"❤️ Tamir",
"⚡ Elektrikli Tel",
"🏴 Yağma",
"🛑 Blok",
"✈️ Hava Saldırısı",
"💉 Enjeksiyon"
];

function log(text){
const area=document.getElementById("log");
area.innerHTML += text + "<br>";
area.scrollTop = area.scrollHeight;
}

function drawCard(){
return cards[Math.floor(Math.random()*cards.length)];
}

function startGame(){

for(let i=0;i<5;i++){
player.hand.push(drawCard());
}

renderHand();

log("Oyun başladı.");
}

function renderHand(){

const hand=document.getElementById("hand");

hand.innerHTML="";

player.hand.forEach((card,index)=>{

const div=document.createElement("div");

div.className="card";

div.innerHTML=card;

div.onclick=()=>{

log(card+" seçildi.");

};

hand.appendChild(div);

});

}

function endTurn(){

log("Tur bitti.");

}

startGame();

</script>

</body>
</html>
